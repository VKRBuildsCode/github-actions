name: My First Workflow

on: 
  push:
    branches:
      - main  # Triggers on pushes to the main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Specifies the type of runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Checks out your repository code
      
      - name: Run a script
        run: echo "Hello, World!"  # Replace with your script or command
      - name: Image 2 PDF Action
        uses: sharadcodes/img2pdf-action@v1.0
        with:
          image-folder: 'images' # This is a Required field & this folder has original images
          page-size: 'A4' # This is a Required field & it is used to specify the page size of PDFs
          output-folder: 'mypdfs' # This is Required field & this folder will be used to store generated PDFs